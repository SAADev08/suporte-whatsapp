<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Teste WebSocket STOMP</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
        <style>
            body {
                font-family: Arial, sans-serif;
                padding: 20px;
                background: #1a1a2e;
                color: #eee;
            }
            input,
            button {
                padding: 8px 12px;
                margin: 4px;
                border-radius: 4px;
                border: none;
            }
            input {
                background: #16213e;
                color: #eee;
                width: 400px;
            }
            button {
                background: #0f3460;
                color: #fff;
                cursor: pointer;
            }
            button:hover {
                background: #e94560;
            }
            #log {
                background: #16213e;
                padding: 16px;
                border-radius: 8px;
                margin-top: 16px;
                height: 400px;
                overflow-y: auto;
                font-family: monospace;
                font-size: 13px;
            }
            .ok {
                color: #00ff88;
            }
            .err {
                color: #ff4444;
            }
            .msg {
                color: #00bfff;
            }
            .info {
                color: #ffcc00;
            }
        </style>
    </head>
    <body>
        <h2>🔌 Teste WebSocket STOMP — Suporte WhatsApp</h2>

        <div>
            <label>JWT Token:</label><br />
            <input
                id="token"
                type="text"
                placeholder="Cole aqui o token do /api/auth/login"
            />
        </div>
        <br />
        <button onclick="conectar()">▶ Conectar</button>
        <button onclick="desconectar()">⏹ Desconectar</button>
        <button onclick="limpar()">🗑 Limpar log</button>

        <div id="log"></div>

        <script>
            var stompClient = null;

            function log(msg, tipo) {
                var div = document.getElementById("log");
                var linha = document.createElement("div");
                linha.className = tipo || "info";
                linha.textContent =
                    new Date().toLocaleTimeString() + " — " + msg;
                div.appendChild(linha);
                div.scrollTop = div.scrollHeight;
            }

            function conectar() {
                var token = document.getElementById("token").value.trim();
                if (!token) {
                    log("⚠ Cole o JWT token antes de conectar!", "err");
                    return;
                }

                log("Conectando em ws://localhost:8080/ws ...", "info");

                var socket = new SockJS("http://localhost:8080/ws");
                stompClient = Stomp.over(socket);
                stompClient.debug = null; // silencia logs internos

                var headers = { Authorization: "Bearer " + token };

                stompClient.connect(
                    headers,
                    function (frame) {
                        log("✅ Conectado! " + frame, "ok");

                        // Inscrever nos tópicos do sistema
                        stompClient.subscribe(
                            "/topic/notificacoes",
                            function (msg) {
                                log(
                                    "📨 /topic/notificacoes → " + msg.body,
                                    "msg",
                                );
                            },
                        );

                        stompClient.subscribe(
                            "/topic/chamados",
                            function (msg) {
                                log("📋 /topic/chamados → " + msg.body, "msg");
                            },
                        );

                        stompClient.subscribe("/topic/chat", function (msg) {
                            log("💬 /topic/chat → " + msg.body, "msg");
                        });

                        stompClient.subscribe("/topic/sla", function (msg) {
                            log("⏰ /topic/sla → " + msg.body, "msg");
                        });

                        log(
                            "👂 Inscrito nos tópicos: /topic/notificacoes, /topic/chamados, /topic/chat, /topic/sla",
                            "ok",
                        );
                    },
                    function (error) {
                        log("❌ Erro na conexão: " + error, "err");
                    },
                );
            }

            function desconectar() {
                if (stompClient) {
                    stompClient.disconnect();
                    log("🔌 Desconectado.", "info");
                    stompClient = null;
                }
            }

            function limpar() {
                document.getElementById("log").innerHTML = "";
            }
        </script>
    </body>
</html>
